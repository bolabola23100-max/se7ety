name: se7ety
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.4
  gap: ^3.0.1
  go_router: ^17.2.1
  easy_localization: ^3.0.8
  shared_preferences: ^2.5.4
  firebase_core: ^4.7.0
  smooth_page_indicator: ^2.0.1
  firebase_auth: ^6.4.0
  dartz: ^0.10.1
  flutter_bloc: ^9.1.1
  lottie: ^3.3.3
  cloud_firestore: ^6.3.0
  image_picker: ^1.2.1
  http: ^1.2.2
  google_nav_bar: ^5.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/

fonts:
  - family: Cairo
    fonts:
      - asset: assets/fonts/Cairo-Regular.ttf
      - asset: assets/fonts/Cairo-Bold.ttf
        weight: 700
      - asset: assets/fonts/Cairo-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Cairo-Light.ttf
        weight: 300
      - asset: assets/fonts/Cairo-Medium.ttf
        weight: 500
      - asset: assets/fonts/Cairo-Black.ttf
        weight: 900
      - asset: assets/fonts/Cairo-ExtraBold.ttf
        weight: 800
      - asset: assets/fonts/Cairo-ExtraLight.ttf
        weight: 200
      - asset: assets/fonts/Cairo-Italic.ttf
        weight: 400
